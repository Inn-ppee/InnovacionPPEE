<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portafolio de Innovación PPEE 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --font: 'Poppins', sans-serif;
      --bg-primary: #ffffff;
      --bg-secondary: #f5f6f8;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --border: rgba(0,0,0,0.09);
      --border-md: rgba(0,0,0,0.15);
      --radius-sm: 7px;
      --radius-lg: 14px;
    }
    body { font-family: var(--font); background: #eef0f4; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .layout { display: grid; grid-template-columns: 260px 1fr; height: 700px; width: 100%; max-width: 1140px; border: 0.5px solid var(--border); border-radius: 16px; overflow: hidden; background: var(--bg-primary); box-shadow: 0 4px 28px rgba(0,0,0,0.09); }
    .sidebar { border-right: 0.5px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 13px 15px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .sidebar-header h1 { font-size: 14px; font-weight: 600; color: var(--text-primary); font-family: var(--font); }
    .sidebar-header span { font-size: 10px; color: #185FA5; font-weight: 500; background: #EBF3FB; padding: 2px 7px; border-radius: 10px; }
    .clear-btn { font-size: 10px; color: #185FA5; background: none; border: none; cursor: pointer; font-family: var(--font); display: none; }
    .clear-btn.visible { display: block; }
    .search-wrap { padding: 8px 10px; border-bottom: 0.5px solid var(--border); }
    .search-wrap input { width: 100%; padding: 6px 10px; font-size: 11px; font-family: var(--font); border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-secondary); color: var(--text-primary); outline: none; }
    .filters-panel { overflow-y: auto; border-bottom: 0.5px solid var(--border); max-height: 290px; }
    .filter-group { border-bottom: 0.5px solid var(--border); }
    .filter-group:last-child { border-bottom: none; }
    .filter-group-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; cursor: pointer; user-select: none; }
    .filter-group-label { font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-secondary); font-family: var(--font); }
    .filter-group-meta { display: flex; align-items: center; gap: 5px; }
    .active-count { font-size: 10px; background: #EBF3FB; color: #185FA5; border-radius: 10px; padding: 1px 5px; display: none; font-family: var(--font); }
    .active-count.visible { display: inline-block; }
    .chevron { font-size: 9px; color: var(--text-secondary); transition: transform 0.15s; }
    .filter-group.collapsed .chevron { transform: rotate(-90deg); }
    .filter-group-body { padding: 4px 8px 8px; display: flex; flex-direction: column; gap: 2px; }
    .filter-group.collapsed .filter-group-body { display: none; }
    .filter-opt { display: flex; align-items: center; gap: 7px; padding: 4px 5px; border-radius: 6px; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-family: var(--font); transition: background 0.1s; }
    .filter-opt:hover { background: var(--bg-secondary); }
    .filter-opt.selected { background: #EBF3FB; }
    .filter-opt-check { width: 13px; height: 13px; border-radius: 3px; border: 1.5px solid var(--border-md); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .filter-opt.selected .filter-opt-check { background: #185FA5; border-color: #185FA5; }
    .filter-opt-label { font-size: 11px; color: var(--text-primary); flex: 1; font-family: var(--font); }
    .filter-opt.selected .filter-opt-label { color: #185FA5; }
    .filter-opt-count { font-size: 10px; color: var(--text-secondary); background: var(--bg-secondary); border-radius: 8px; padding: 1px 5px; font-family: var(--font); }
    .filter-opt.selected .filter-opt-count { background: #dbeeff; color: #185FA5; }
    .results-bar { padding: 5px 12px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .results-label { font-size: 10px; color: var(--text-secondary); font-family: var(--font); }
    .initiative-list { flex: 1; overflow-y: auto; padding: 5px; }
    .item-btn { width: 100%; text-align: left; background: none; border: 0.5px solid transparent; border-radius: var(--radius-sm); padding: 7px 9px; cursor: pointer; margin-bottom: 2px; font-family: var(--font); transition: background 0.1s; }
    .item-btn:hover { background: var(--bg-secondary); }
    .item-btn.active { background: #EBF3FB; border-color: #B5D4F4; }
    .item-top { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; flex-wrap: wrap; }
    .item-id { font-size: 10px; font-weight: 600; color: var(--text-secondary); font-family: var(--font); }
    .item-btn.active .item-id { color: #185FA5; }
    .item-name { font-size: 11px; color: var(--text-primary); line-height: 1.35; font-family: var(--font); }
    .item-sub { font-size: 10px; color: var(--text-secondary); margin-top: 3px; display: flex; align-items: center; gap: 6px; font-family: var(--font); }
    .new-badge { font-size: 9px; font-weight: 600; background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97; border-radius: 10px; padding: 1px 6px; }
    .tag { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 20px; font-size: 9px; font-weight: 500; border: 1px solid; font-family: var(--font); }
    .tag-lg { padding: 4px 10px; font-size: 11px; border-width: 1.5px; }
    .tag-blue  { background: #EBF3FB; color: #185FA5; border-color: #B5D4F4; }
    .tag-amber { background: #FAEEDA; color: #854F0B; border-color: #FAC775; }
    .tag-green { background: #EAF3DE; color: #3B6D11; border-color: #C0DD97; }
    .tag-red   { background: #FCEBEB; color: #A32D2D; border-color: #F7C1C1; }
    .tag-gray  { background: #F1EFE8; color: #5F5E5A; border-color: #D3D1C7; }
    .tag-purple{ background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; }
    .tag-teal  { background: #E1F5EE; color: #085041; border-color: #9FE1CB; }
    .tag-orange{ background: #FEF0E7; color: #7A3010; border-color: #F0997B; }
    .tag-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg-secondary); }
    .ficha-wrap { flex: 1; overflow-y: auto; padding: 12px; }
    .ficha { background: var(--bg-primary); border-radius: var(--radius-lg); overflow: hidden; border: 0.5px solid var(--border); }
    .ficha-header { padding: 15px 17px 13px; }
    .fh-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
    .fh-id { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.65); font-family: var(--font); }
    .fh-title { font-size: 17px; font-weight: 600; color: #fff; line-height: 1.3; font-family: var(--font); }
    .empresa-logo { height: 28px; max-width: 90px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.9; }
    .download-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35); border-radius: 20px; color: #fff; font-size: 11px; font-family: var(--font); cursor: pointer; transition: background 0.15s; margin-top: 10px; }
    .download-btn:hover { background: rgba(255,255,255,0.30); }
    .ficha-body { padding: 14px 17px; }
    .tags-row-lg { display: flex; gap: 5px; margin-bottom: 14px; flex-wrap: wrap; }
    .stepper { display: flex; align-items: flex-start; margin-bottom: 18px; }
    .step { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 50px; }
    .step-connector { flex: 1; height: 2px; margin-top: 16px; background: #D3D1C7; }
    .step-connector.done { background: #3B6D11; }
    .step-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; font-family: var(--font); flex-shrink: 0; }
    .step-circle.done { background: #3B6D11; color: #fff; }
    .step-circle.active { background: #185FA5; color: #fff; }
    .step-circle.pending { background: #E8E6DF; color: #888780; }
    .step-label { font-size: 10px; color: var(--text-secondary); text-align: center; line-height: 1.3; font-family: var(--font); }
    .step-label.active-label { color: #185FA5; font-weight: 600; }
    .section { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 0.5px solid var(--border); }
    .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .section-label { font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); margin-bottom: 7px; font-family: var(--font); }
    .desc-box { font-size: 13px; color: var(--text-primary); line-height: 1.7; font-family: var(--font); }
    .placeholder-box { background: var(--bg-secondary); border-radius: 7px; padding: 9px 11px; font-size: 12px; color: var(--text-secondary); line-height: 1.6; border: 0.5px solid var(--border); font-style: italic; font-family: var(--font); }
    .empresa-card { display: flex; align-items: center; gap: 12px; background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 10px 14px; border: 0.5px solid var(--border); }
    .empresa-card-logo { height: 30px; max-width: 100px; object-fit: contain; }
    .empresa-card-name { font-size: 13px; font-weight: 600; color: var(--text-primary); font-family: var(--font); }
    .empresa-card-url { font-size: 11px; color: #185FA5; font-family: var(--font); }
    .celula-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; }
    .celula-card { background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 7px 9px; border: 0.5px solid var(--border); }
    .celula-role { font-size: 10px; color: var(--text-secondary); margin-bottom: 2px; font-family: var(--font); }
    .celula-name { font-size: 11px; font-weight: 600; color: var(--text-primary); font-family: var(--font); }
    .centros-table { width: 100%; border-collapse: collapse; font-family: var(--font); }
    .centros-table th { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); font-weight: 600; padding: 5px 8px; text-align: center; border-bottom: 0.5px solid var(--border); }
    .centros-table th.left { text-align: left; }
    .centros-table td { padding: 5px 8px; font-size: 11px; color: var(--text-primary); border-bottom: 0.5px solid var(--border); text-align: center; vertical-align: middle; font-family: var(--font); }
    .centros-table td.left { text-align: left; font-size: 10px; color: var(--text-secondary); }
    .centros-table tr:last-child td { border-bottom: none; }
    .estado-activo { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: #EAF3DE; }
    .estado-finalizado { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: #EBF3FB; }
    .estado-entregado { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: #F1EFE8; }
    .legend { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-secondary); font-family: var(--font); }
    .hip-block { display: flex; flex-direction: column; gap: 8px; }
    .hip-item { background: var(--bg-secondary); border-radius: 8px; border: 0.5px solid var(--border); overflow: hidden; }
    .hip-header { display: flex; align-items: flex-start; gap: 8px; padding: 8px 11px; }
    .hip-badge { font-size: 10px; font-weight: 600; color: #185FA5; background: #EBF3FB; border-radius: 5px; padding: 2px 6px; flex-shrink: 0; margin-top: 1px; font-family: var(--font); }
    .hip-text { font-size: 12px; color: var(--text-primary); line-height: 1.55; font-family: var(--font); }
    .kpi-row { display: flex; flex-direction: column; gap: 3px; padding: 0 11px 8px; margin-top: -2px; }
    .kpi-pill { display: flex; align-items: flex-start; gap: 6px; background: #fff; border: 0.5px solid var(--border); border-radius: 6px; padding: 5px 8px; }
    .kpi-num { font-size: 9px; font-weight: 600; color: #888780; flex-shrink: 0; margin-top: 1px; min-width: 24px; font-family: var(--font); }
    .kpi-text { font-size: 11px; color: var(--text-secondary); line-height: 1.45; font-family: var(--font); }
    .brechas-list { display: flex; flex-direction: column; gap: 5px; }
    .brecha-item { display: flex; align-items: flex-start; gap: 8px; background: #FAEEDA; border: 0.5px solid #FAC775; border-radius: 7px; padding: 8px 11px; }
    .brecha-dot { width: 6px; height: 6px; border-radius: 50%; background: #BA7517; flex-shrink: 0; margin-top: 4px; }
    .brecha-text { font-size: 12px; color: #633806; line-height: 1.55; font-family: var(--font); }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); gap: 10px; }
    .empty-state span { font-size: 13px; font-family: var(--font); }
    .no-results { padding: 20px; text-align: center; font-size: 12px; color: var(--text-secondary); font-family: var(--font); }
    .item-logo { height: 13px; max-width: 38px; object-fit: contain; opacity: 0.7; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Portafolio PPEE</h1>
      <span>2026</span>
    </div>
    <div style="padding:4px 10px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:10px;color:var(--text-secondary);font-family:var(--font)">19 iniciativas</span>
      <button class="clear-btn" id="clearBtn" onclick="clearAll()">✕ Limpiar</button>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Buscar por nombre o ID…" oninput="applyFilters()">
    </div>
    <div class="filters-panel" id="filtersPanel"></div>
    <div class="results-bar"><span class="results-label" id="resultsLabel"></span></div>
    <div class="initiative-list" id="list"></div>
  </aside>
  <main class="main" id="main">
    <div class="empty-state">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><rect x="4" y="4" width="28" height="28" rx="6" stroke="#D3D1C7" stroke-width="1.5"/><line x1="11" y1="14" x2="25" y2="14" stroke="#D3D1C7" stroke-width="1.5" stroke-linecap="round"/><line x1="11" y1="20" x2="20" y2="20" stroke="#D3D1C7" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span>Selecciona una iniciativa</span>
    </div>
  </main>
</div>
<script>

  1:[{id:"H1",texto:"SI implementamos plantas modulares de tratamiento de aguas grises (PTAG) en obras con alto consumo hídrico, ENTONCES reduciremos el consumo de agua potable de red y la descarga al alcantarillado en al menos un 30% durante la fase de construcción.",kpis:["% de reducción de consumo de agua potable vs. línea base de obra (meta ≥30% mensual)","m³ de aguas grises tratadas y reutilizadas / m³ totales consumidos en obra (meta ≥25%)","Huella hídrica (L/m² construido) antes vs. después del piloto (meta reducción ≥20%)"]},{id:"H2",texto:"SI estandarizamos un protocolo de operación y mantenimiento de PTAG con proveedor y capacitamos al equipo de obra, ENTONCES lograremos continuidad operativa con mínima intervención externa y costos controlados.",kpis:["% de disponibilidad operativa de la PTAG (meta ≥90%)","N° de incidentes críticos / mes con parada mayor a 24 h (meta ≤1)","Costo unitario de operación y mantenimiento (CLP / m³ tratado) vs. meta presupuestada"]},{id:"H3",texto:"SI consolidamos un caso de negocio con VAN positivo y payback menor a 3 años replicable en obras PPEE, ENTONCES habilitamos la inclusión de PTAG como estándar en bases de licitación futuras.",kpis:["Payback del piloto (meses) vs. meta ≤36 meses","Ahorro económico acumulado por reutilización (CLP/mes) vs. costo del agua potable evitada","N° de obras adheridas al estándar PPEE de reutilización de aguas grises (meta ≥3 obras al cierre 2026)"]}],

function uniq(arr){return[...new Set(arr.filter(Boolean))].sort()}
const allFocos=uniq(DATA.map(f=>f.foco).filter(f=>f!=="—"));
const allEtapas=["Detectar","Diseñar","Pilotear","Escalar","I+D"].filter(e=>DATA.some(f=>f.etapa===e));
const allEstados=uniq(DATA.map(f=>f.estado));
const allSponsors=uniq(DATA.flatMap(f=>f.sponsors).filter(s=>s!=="—"&&s!=="Por definir"));
const filterState={foco:new Set(),etapa:new Set(),estado:new Set(),sponsor:new Set(),nueva:new Set()};
const FILTER_DEFS=[
  {key:"foco",   label:"Foco",          values:allFocos},
  {key:"etapa",  label:"Etapa",         values:allEtapas},
  {key:"estado", label:"Estado",        values:allEstados},
  {key:"sponsor",label:"Sponsor",       values:allSponsors},
  {key:"nueva",  label:"Tipo",          values:["Nueva 2026","Continúa 2025"]},
];

function getFiltered(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  return DATA.filter(f=>{
    if(q&&!f.nombre.toLowerCase().includes(q)&&!String(f.id).includes(q)) return false;
    if(filterState.foco.size&&!filterState.foco.has(f.foco)) return false;
    if(filterState.etapa.size&&!filterState.etapa.has(f.etapa)) return false;
    if(filterState.estado.size&&!filterState.estado.has(f.estado)) return false;
    if(filterState.sponsor.size&&!f.sponsors.some(s=>filterState.sponsor.has(s))) return false;
    if(filterState.nueva.size){
      const isNueva=filterState.nueva.has("Nueva 2026");
      const isContinua=filterState.nueva.has("Continúa 2025");
      if(isNueva&&isContinua){}
      else if(isNueva&&!f.nueva) return false;
      else if(isContinua&&f.nueva) return false;
    }
    return true;
  });
}

function countVal(key,val){
  return DATA.filter(f=>{
    const q=document.getElementById("searchInput").value.toLowerCase();
    if(q&&!f.nombre.toLowerCase().includes(q)&&!String(f.id).includes(q)) return false;
    for(const [k,s] of Object.entries(filterState)){
      if(k===key||!s.size) continue;
      if(k==="sponsor"&&!f.sponsors.some(x=>s.has(x))) return false;
      else if(k==="nueva"){
        const isN=s.has("Nueva 2026"),isC=s.has("Continúa 2025");
        if(isN&&isC){}else if(isN&&!f.nueva) return false;else if(isC&&f.nueva) return false;
      }
      else if(!["sponsor","nueva"].includes(k)&&!s.has(f[k])) return false;
    }
    if(key==="sponsor") return f.sponsors.includes(val);
    if(key==="nueva") return val==="Nueva 2026"?f.nueva:!f.nueva;
    return f[key]===val;
  }).length;
}

function buildFilters(){
  const panel=document.getElementById("filtersPanel");
  panel.innerHTML="";
  FILTER_DEFS.forEach(def=>{
    const grp=document.createElement("div");grp.className="filter-group";grp.id="grp-"+def.key;
    const n=filterState[def.key].size;
    grp.innerHTML=`<div class="filter-group-header" onclick="toggleGroup('${def.key}')"><span class="filter-group-label">${def.label}</span><div class="filter-group-meta"><span class="active-count${n?" visible":""}" id="ac-${def.key}">${n}</span><span class="chevron">▾</span></div></div><div class="filter-group-body" id="body-${def.key}"></div>`;
    panel.appendChild(grp);renderOpts(def);
  });
}

function renderOpts(def){
  const body=document.getElementById("body-"+def.key);if(!body) return;body.innerHTML="";
  def.values.forEach(val=>{
    const sel=filterState[def.key].has(val);const cnt=countVal(def.key,val);
    const btn=document.createElement("button");btn.className="filter-opt"+(sel?" selected":"");
    btn.innerHTML=`<div class="filter-opt-check">${sel?`<svg width="9" height="9" viewBox="0 0 9 9"><polyline points="1,4.5 3.5,7 8,2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`:""}</div><span class="filter-opt-label">${val}</span><span class="filter-opt-count">${cnt}</span>`;
    btn.onclick=()=>{filterState[def.key].has(val)?filterState[def.key].delete(val):filterState[def.key].add(val);applyFilters();};
    body.appendChild(btn);
  });
}

function toggleGroup(key){document.getElementById("grp-"+key).classList.toggle("collapsed")}

function tagH(label,color,lg){return `<span class="tag${lg?" tag-lg":""} tag-${color}"><span class="tag-dot" style="background:${DOTS[color]||'#888'}"></span>${label}</span>`;}

function stepperH(etapa){
  if(etapa==="I+D") return `<div style="display:inline-flex;align-items:center;gap:6px;padding:5px 11px;background:#EEEDFE;border-radius:7px;font-size:11px;font-family:'Poppins',sans-serif;color:#3C3489;border:0.5px solid #AFA9EC;margin-bottom:16px">Fase I+D — exploración temprana</div>`;
  const paso=ETAPA_STEP[etapa]??0;
  return `<div class="stepper">${STEPS.map((s,i)=>{
    const done=i<paso,active=i===paso;
    const cls=done?"done":active?"active":"pending";
    const icon=done?`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><polyline points="2,6.5 5.5,10 11,3" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`:`${i+1}`;
    const conn=i<4?`<div class="step-connector${done?" done":""}"></div>`:"";
    return `<div class="step"><div class="step-circle ${cls}">${icon}</div><div class="step-label${active?" active-label":""}">${s}</div></div>${conn}`;
  }).join("")}</div>`;
}

function centrosTableH(f){
  const m=CENTROS_MATRIZ[f.id]||{};
  const activos=ALL_CENTROS.filter(c=>m[c]);
  if(!activos.length) return `<div class="placeholder-box">Sin centros de trabajo asignados aún.</div>`;
  const rows=activos.map(c=>{
    const est=m[c];const cel=CELULAS.find(r=>r.id===f.id&&r.centro===c);const impl=cel?cel.impl:"—";
    let badge="";
    if(est===1) badge=`<div class="estado-activo"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="#3B6D11" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
    if(est===2) badge=`<div class="estado-finalizado"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="5.5" r="4.5" stroke="#185FA5" stroke-width="1.2"/><line x1="5.5" y1="3" x2="5.5" y2="5.5" stroke="#185FA5" stroke-width="1.2" stroke-linecap="round"/><circle cx="5.5" cy="7.5" r="0.7" fill="#185FA5"/></svg></div>`;
    if(est===3) badge=`<div class="estado-entregado"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="1" y="1" width="9" height="9" rx="2" stroke="#888780" stroke-width="1.2"/><polyline points="3,5.5 5,7.5 8,3.5" stroke="#888780" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
    const nota=est===3?` <span style="font-size:9px;color:#888780;font-style:italic">(obra entregada)</span>`:est===2?` <span style="font-size:9px;color:#185FA5;font-style:italic">(finalizada)</span>`:"";
    return `<tr><td class="left">${CENTRO_SHORT[c]||c}${nota}</td><td>${badge}</td><td style="text-align:left;font-size:10px;color:#6b7280;font-family:'Poppins',sans-serif">${impl}</td></tr>`;
  }).join("");
  return `<div class="legend"><div class="legend-item"><div class="estado-activo" style="width:16px;height:16px"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>Activa</div><div class="legend-item"><div class="estado-finalizado" style="width:16px;height:16px"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="#185FA5" stroke-width="1.2"/><line x1="5" y1="2.5" x2="5" y2="5" stroke="#185FA5" stroke-width="1.2" stroke-linecap="round"/><circle cx="5" cy="7" r="0.7" fill="#185FA5"/></svg></div>Finalizada</div><div class="legend-item"><div class="estado-entregado" style="width:16px;height:16px"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="8" rx="1.5" stroke="#888780" stroke-width="1.2"/><polyline points="2.5,5 4.5,7 7.5,3" stroke="#888780" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>Obra entregada</div></div><table class="centros-table"><thead><tr><th class="left">Centro</th><th>Estado</th><th class="left">Implementador</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function hipSec(f){
  if(!f.hipotesis.length) return `<div class="section"><div class="section-label">Hipótesis y KPIs</div><div class="placeholder-box">Por definir.</div></div>`;
  const items=f.hipotesis.map(h=>`<div class="hip-item"><div class="hip-header"><span class="hip-badge">${h.id}</span><span class="hip-text">${h.texto}</span></div>${h.kpis.length?`<div class="kpi-row">${h.kpis.map((k,i)=>`<div class="kpi-pill"><span class="kpi-num">KPI ${i+1}</span><span class="kpi-text">${k}</span></div>`).join("")}</div>`:""}</div>`).join("");
  return `<div class="section"><div class="section-label">Hipótesis y KPIs</div><div class="hip-block">${items}</div></div>`;
}

function downloadFicha(nombre,id){
  const el=document.getElementById("ficha-content");if(!el) return;
  const btn=document.getElementById("download-btn");if(btn) btn.style.display="none";
  html2pdf().set({margin:10,filename:`INN-${String(id).padStart(2,"0")}_${nombre.replace(/[^a-zA-Z0-9]/g,"_")}.pdf`,image:{type:"jpeg",quality:0.98},html2canvas:{scale:2,useCORS:true,logging:false},jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}}).from(el).save().then(()=>{if(btn) btn.style.display="inline-flex";});
}

function renderFicha(f){
  const rows=CELULAS.filter(c=>c.id===f.id);
  const sponsors=[...new Set(rows.map(c=>c.sponsor))];
  const gestores=[...new Set(rows.map(c=>c.gestor).filter(g=>g&&g!=="-"))];
  const hdr=HDR_COLOR[f.foco]||"#4B5563";
  const ei=f.empresa;
  const eHdr=ei?`<img src="${ei.logo}" class="empresa-logo" alt="${ei.nombre}" onerror="this.style.display='none'">`:"";
  const eSec=ei?`<div class="section"><div class="section-label">Empresa asociada</div><div class="empresa-card"><img src="${ei.logo}" class="empresa-card-logo" alt="${ei.nombre}" onerror="this.style.display='none'"><div><div class="empresa-card-name">${ei.nombre}</div><a href="https://${ei.url}" target="_blank" class="empresa-card-url">${ei.url}</a></div></div></div>`:"";

  const sponsorDisplay=f.nueva?(f.sponsor||"Por definir"):sponsors.join(", ")||"—";
  const gestorDisplay=f.nueva?(f.gestor||"Por definir"):gestores.join(", ")||"Por definir";
  const nCentros=f.centrosTodos.length;

  const cSec=`<div class="section"><div class="section-label">Célula de innovación</div><div class="celula-grid"><div class="celula-card"><div class="celula-role">Sponsor</div><div class="celula-name">${sponsorDisplay}</div></div><div class="celula-card"><div class="celula-role">Gestor</div><div class="celula-name">${gestorDisplay}</div></div><div class="celula-card"><div class="celula-role">N° de centros</div><div class="celula-name">${nCentros>0?nCentros+" centro"+(nCentros!==1?"s":""):"Por definir"}</div></div></div></div>`;

  const bSec=f.brechas.length?`<div class="section"><div class="section-label">Brechas / Oportunidades de mejora</div><div class="brechas-list">${f.brechas.map(b=>`<div class="brecha-item"><div class="brecha-dot"></div><div class="brecha-text">${b}</div></div>`).join("")}</div></div>`:"";

  const nuevaBadge=f.nueva?`<span style="display:inline-block;font-size:10px;font-weight:600;background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4);border-radius:10px;padding:2px 8px;font-family:'Poppins',sans-serif">Nueva 2026</span>`:"";

  document.getElementById("main").innerHTML=`
  <div class="ficha-wrap"><div class="ficha" id="ficha-content">
    <div class="ficha-header" style="background:${hdr}">
      <div class="fh-top"><div class="fh-id">INN-${String(f.id).padStart(2,"0")} · ${f.anio} ${nuevaBadge}</div>${eHdr}</div>
      <div class="fh-title">${f.nombre}</div>
      <button id="download-btn" class="download-btn" onclick="downloadFicha('${f.nombre.replace(/'/g,"\\'").replace(/"/g,"&quot;")}',${f.id})">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M3.5 5.5l3 3 3-3M1 10h11" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>Descargar ficha
      </button>
    </div>
    <div class="ficha-body">
      <div class="tags-row-lg">
        ${f.foco!=="—"?tagH(f.foco,FOCO_COLOR[f.foco]||"gray",true):""}
        ${tagH(f.etapa,ETAPA_COLOR[f.etapa]||"gray",true)}
        ${tagH(f.estado,ESTADO_COLOR[f.estado]||"gray",true)}
        ${f.tipo!=="Por definir"?tagH(f.tipo,f.tipo==="Disruptiva"?"purple":"gray",true):tagH("Tipo por definir","gray",true)}
        ${f.beneficio!=="—"?tagH("Beneficio "+f.beneficio,"blue",true):""}
      </div>
      ${stepperH(f.etapa)}
      <div class="section"><div class="section-label">Descripción de la solución</div><div class="desc-box">${f.descripcion||`<span style="color:#6b7280;font-style:italic">Por definir — descripción de la iniciativa pendiente.</span>`}</div></div>
      ${eSec}
      ${cSec}
      <div class="section"><div class="section-label">Centros de trabajo</div>${centrosTableH(f)}</div>
      ${hipSec(f)}
      ${bSec}
    </div>
  </div></div>`;
}

let activeBtn=null;
function applyFilters(){
  FILTER_DEFS.forEach(def=>{renderOpts(def);const n=filterState[def.key].size;const el=document.getElementById("ac-"+def.key);if(el){el.textContent=n;el.classList.toggle("visible",n>0);}});
  document.getElementById("clearBtn").classList.toggle("visible",Object.values(filterState).some(s=>s.size>0)||!!document.getElementById("searchInput").value);
  const filtered=getFiltered();
  document.getElementById("resultsLabel").textContent=`${filtered.length} iniciativa${filtered.length!==1?"s":""}`;
  const list=document.getElementById("list");list.innerHTML="";
  if(!filtered.length){list.innerHTML=`<div class="no-results">Sin resultados</div>`;return;}
  filtered.forEach(f=>{
    const btn=document.createElement("button");btn.className="item-btn";
    const ec=ETAPA_COLOR[f.etapa]||"gray";
    const nA=f.centrosActivos.length,nF=f.centrosFinalizados.length,nE=f.centrosEntregados.length;
    let ci="";if(nA>0) ci+=`${nA} activo${nA!==1?"s":""}`;if(nF>0) ci+=(ci?" · ":"")+`${nF} finalizado${nF!==1?"s":""}`;if(nE>0) ci+=(ci?" · ":"")+`${nE} entregado${nE!==1?"s":""}`;
    btn.innerHTML=`<div class="item-top">
      <span class="item-id">INN-${String(f.id).padStart(2,"0")}</span>
      <span class="tag tag-${ec}">${f.etapa}</span>
      ${f.nueva?`<span class="new-badge">Nueva</span>`:""}
    </div>
    <div class="item-name">${f.nombre}</div>
    <div class="item-sub">
      <span>${f.foco!=="—"?f.foco:"Sin foco"} · ${f.anio}</span>
      ${ci?`<span style="font-size:9px">${ci}</span>`:""}
    </div>`;
    btn.onclick=()=>{if(activeBtn) activeBtn.classList.remove("active");btn.classList.add("active");activeBtn=btn;renderFicha(f);};
    list.appendChild(btn);
  });
}
function clearAll(){Object.values(filterState).forEach(s=>s.clear());document.getElementById("searchInput").value="";applyFilters();}
buildFilters();applyFilters();
</script>
</body>
</html>
